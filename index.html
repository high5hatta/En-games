<!DOCTYPE html>
<html lang="ja">

        /* 🌿 会員アプリ用（エメラルドミント系グラデーション） */

            box-shadow: 0 6px 0 #d97443, 0 10px 20px rgba(255, 94, 98, 0.3);
        }
        .btn-staff:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #d97443, 0 4px 10px rgba(255, 94, 98, 0.2);
        }

</head>

<div class="container">
